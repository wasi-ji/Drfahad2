(Depression)" : "Depression & Low Mood", description: c ? "گہری اور مسلسل اداسی، زندگی کی دلچسپیوں کا خاتمہ، توانائی کی شدید کمی اور ذہنی تھکن۔" : "Deep, persistent sadness, loss of interest in rewarding activities, energy depletion, and cognitive fatigue.", symptoms: c ? ["مسلسل اداسی، مایوسی یا خالی پن کا احساس", "مشاغل اور قریبی دوستوں سے کترانا یا ملنے کا دل نہ کرنا", "شدید جسمانی سستی، نیند کے مسائل یا حد سے زیادہ سونا", "خود اعتمادی کی کمی اور خود کو قصوروار ٹھہرانا"] : ["Prolonged feelings of sadness or emptiness", "Loss of interest in hobbies and social circles", "Reduced energy, sluggishness, or sleep changes", "Feelings of worthlessness or excessive self-doubt"], reassuringNote: c ? "ڈپریشن ایک قابلِ علاج نیورولوجیکل (دماغی کیڑے کا) مسئلہ ہے۔ مناسب رہنمائی سے بحالی ممکن ہے۔" : "Depression is a physical, treatable neurological condition. Recovery is possible with structured clinical guidance.", iconName: "CloudRain" }, { id: "panic", title: c ? "شدید پینک اٹیک (Panic Attacks)" : "Panic Attacks", description: c ? "اچانک خوف کا خوابناک حملہ اور شدید ہراس، جیسے دل کا تیز دھڑکنا یا دم گھٹنا۔" : "Sudden surges of overwhelming fear and intense physical sensations, often mimicking cardiovascular events.", symptoms: c ? ["اچانک دل کی دھڑکن کا تیز ہونا یا سینے میں دباؤ محسوس ہونا", "سانس لینے میں دقت اور سر کا چکرانا", "ہاتھوں کا کانپنا، پسینہ آنا یا سرد پٹھوں کی لہریں", "حواس کھو دینے یا جان نکل جانے کا شدید وہم اور خوف"] : ["Sudden racing heart or chest tightness", "Shortness of breath and dizziness", "Trembling, sweating, or chills", "Fear of losing control or impending doom"], reassuringNote: c ? "پینک اٹیک کو نیورو کیمیکل توازن اور تھراپی کی مدد سے مکمل طور پر روکا جا سکتا ہے۔" : "Panic responses can be safely dysregulated and deactivated using clinical therapies and biological stabilizing management.", iconName: "Zap" }, { id: "stress-burnout", title: c ? "ذہنی تناؤ اور برن آؤٹ (Stress)" : "Stress & Chronic Burnout", description: c ? "طویل کام، کاروباری یا پڑھائی کے بوجھ کی وجہ سے پیدا ہونے والی مسلسل تھکن اور توانائی کی کمی۔" : "Extreme emotional and physical exhaustion caused by prolonged work stress, academic overload, or life adjustments.", symptoms: c ? ["جسمانی اور ذہنی کام کرنے کی قوت مکمل طور پر ختم ہو جانا", "کام یا پڑھائی کے متعلق مایوسی اور بیزاری محسوس کرنا", "بار بار سر درد ہونا اور قوتِ مدافعت کا کمزور ہونا", "توجہ مرکوز کرنے میں مشکلات اور بھولنے کی عادت"] : ["Complete physical and creative depletion", "Cynicism and emotional detachment", "Frequent headaches and lowered immunity", "Ineffectiveness and cognitive cloudiness"], reassuringNote: c ? "آرام کرنا اور مدد حاصل کرنا کمزوری نہیں ہے۔ ہم بہتر عادات اور علاج سے قوتِ مدافعت بحال کرتے ہیں۔" : "Slowing down and recovering is not a sign of failure. We configure practical boundary strategies and medical support to restore your spark.", iconName: "Flame" }, { id: "sleep-problems", title: c ? "نیند کے امراض (Sleep)" : "Sleep Disorders", description: c ? "سونے میں دشواری، رات کو بار بار جاگنا، یا صبح مکمل نیند نہ ہونے کے بعد تھکن محسوس کرنا۔" : "Trouble falling asleep, night waking, early wakefulness, or restless sleep that impacts morning vitality.", symptoms: c ? ["بستر پر لیٹنے کے بعد ادھا گھنٹہ یا زیادہ دیر تک نیند نہ آنا", "رات کے وقت بار بار آنکھ کھلنا اور دوبارہ سونے میں دشواری", "دن بھر سستی چھائی رہنا اور کام پر توجہ نہ دے پانا", "سونے سے پہلے دماغ میں خیالات کا طوفان اور گھبراہٹ"] : ["Taking over 30 minutes to drift off", "Waking up multiple times throughout the night", "Daytime drowsiness and lack of focus", "Pre-sleep racing thoughts and sleep-related anxiety"], reassuringNote: c ? "باڈی کلاک کی بحالی کے لیے ہمارے پاس محفوظ اور غیر نشہ آور طبی حل موجود ہیں۔" : "Restoring the natural circadian rhythm involves scientific sleep-hygiene protocols coupled with highly precise medical advice.", iconName: "Moon" }, { id: "emotional-wellbeing", title: c ? "جذباتی سکون کی بحالی (Wellbeing)" : "Emotional Wellbeing Support", description: c ? "خود اعتمادی میں کمی، موڈ کا مزاج تیزی سے تبدیل ہونا، اور ضرورت سے زیادہ خود پر تنقید کرنا۔" : "Struggles with self-esteem, difficulty controlling high emotional peaks, mood sensitivity, and frequent self-criticism.", symptoms: c ? ["موڈ کا غیر معمولی ردعمل یا چھوٹی باتوں پر زیادہ پریشان ہونا", "خود پر حد سے زیادہ تنقید اور کمتری کا احساس", "لوگوں یا گھر والوں کے ساتھ تعلقات میں جھنجھلاہٹ", "زندگی میں آنے والی کسی بڑی تبدیلی کو قبول کرنے میں مشکلات"] : ["Frequent shift in feelings and mood reactivity", "Harsh inner critic or persistent self-doubt", "Straining of personal relationships", "Overwhelming transitions or life setbacks"], reassuringNote: c ? "ذہنی لچک پیدا کرنا سیکھا ہوا کلینکل ہنر ہے۔ زندگی کے مشکل مراحل میں رہنمائی حاصل کرنا دانشمندی ہے۔" : "Developing strong psychological resilience is a learned clinical skill. It is normal to seek guidance during life transitions.", iconName: "Heart" }, { id: "adjustment-difficulties", title: c ? "رنگ و مائل مشکلات (Adjustment)" : "Adjustment Difficulties", description: c ? "نئی جگہ منتقلی، نوکری کی تبدیلی یا کسی بڑے نقصان کے بعد زندگی میں تعطل کا شکار ہونا۔" : "Intense emotional distress, social withdrawal, or anxiety following a significant life change, loss, or relocation.", symptoms: c ? ["ہر وقت دباؤ اور حالات کی مغلوبیت کا احساس", "صحت، رقم یا خاندان کے بدلتے ہوئے اصول ماننے میں دشواری", "سب سے کٹ کر رہنا اور سماجی تنہائی اختیار کرنا", "مستقبل کے فیصلے کرنے اور منصوبہ بندی کرنے میں عاجز ہونا"] : ["Persistent state of feeling overwhelmed", "Difficulty accepting changes in health, family, or employment", "Social isolation or school/work underperformance", "Inability to concentrate or plan future steps"], reassuringNote: c ? "حالات کی تبدیلی سے نبرد آزما ہونا اکیلے مشکل ہو سکتا ہے۔ ہم آپ کو مناسب سہارا فراہم کرتے ہیں۔" : "Navigating transitional storms is safer with professional mental scaffolding. Your coping reflexes can be nurtured.", iconName: "Compass" }, { id: "mood-disorders", title: c ? "شدید موڈ موصلیات (Mood Disorders)" : "Mood Disorders", description: c ? "توانائی، حوصلے اور مزاج میں آنے والا بڑا اتار چڑھاؤ جو روزمرہ تعلقات کو شدید متاثر کرتا ہے۔" : "Significant fluctuations in energy, motivation, and temperament, extending beyond normal daily highs and lows.", symptoms: c ? ["کچھ دن غیر معمولی خوشی اور توانائی، اور کچھ دن گہری اداسی کے چکر", "تیز رفتاری سے بولنا یا جلد بازی میں اہم فیصلے کر لینا", "اداسی کے فیز میں جسمانی توانائی کی شدید کمی اور مایوسی", "کام کی کارکردگی اور رشتوں پر منفی نتائج کا بار بار ظاہر ہونا"] : ["Cycles of heightened activation followed by severe drops", "Racing thoughts, fast speech, or impulsive choices", "Severe fatigue paired with despair in low phases", "Substantial impact on interpersonal relationships"], reassuringNote: c ? "موڈ کو اعتدال پر لانا سائنسی طبی مشاہدے اور جدید ادویات کی مدد سے سو فیصد یقینی ہے۔" : "Balanced mood regulation is achievable through evidence-based psychiatric observation and continuous chemical harmony.", iconName: "Sparkles" }], y = [{ id: "psych-eval", title: c ? "تفصیلی نفسیاتی معائنہ" : "Psychiatric Evaluation", description: c ? "آپ کی جسمانی، نفسیاتی اور خاندانی تاریخ کا گہرائی سے اطمینان بخش جائزہ تاکہ ایک درست تشخیص کی جا سکے۔" : "A deep-dive initial consultation exploring your biological, psychological, and social history to formulate a compassionate and precise mental health diagnosis.", benefits: c ? ["بغیر کسی جلد بازی کے مسائل اور تاریخ شیئر کرنے کا پرسکون ماحول", "ایک مستند اور سائنسی طور پر درست تشخیص کا حصول", "صحت یابی کے لیے باہمی مشورے سے تشکیلی روڈ میپ"] : ["Clear, stress-free clinical diagnosis", "Safe, unhurried space to share your history", "Collaborative baseline blueprint for recovery"], suitableFor: c ? "ہر وہ فرد جو اپنی ذہنی صحت اور علامات کے بارے میں درست ترین حتمی رائے مانگتا ہے۔" : "Anyone seeking a definitive, professional answer regarding their mental health symptoms.", iconName: "ClipboardCheck" }, { id: "med-management", title: c ? "ادویات کا سائنسی انتظام" : "Medication Management", description: c ? "دماغی کیمیکلز کو متوازن کرنے کے لیے انتہائی جدید، محفوظ اور کم سے کم سائیڈ ایفیکٹس والی درست دوا تجویز کرنا۔" : "Carefully calibrated and strictly monitored pharmacotherapy utilizing modern, safe psychiatric medicines with minimal side effects to balance brain chemistry.", benefits: c ? ["دورِ جدید کی محفوظ ترین ادویات کا ہلکی ترین مقدار سے ہدف دار آغاز", "باقاعدگی سے دوز اور اثرات کا سائنسی مشاہدہ اور تبدیلی", "نشے سے پاک اور صحت یابی کے بعد گاہے بگاہے دوا کم کرنے کا نظام"] : ["Minimization of side effects through conservative starting doses", "Continuous scientific review and medicine tuning", "Focus on dynamic weaning-off strategies when appropriate"], suitableFor: c ? "وہ افراد جنہیں شدید ذہنی تناؤ، ڈیپریشن یا ہارمونل توازن کے لیے طبی مدد درکار ہے۔" : "Patients with chemical imbalances like severe anxiety, mood swings, or biological depression.", iconName: "Pills" }, { id: "anxiety-depression-rx", title: c ? "ڈپریشن اور اینگزائٹی کا مربوط علاج" : "Anxiety & Depression Treatments", description: c ? "ایک ایسا مربوط علاج جس میں ادویات کے ساتھ ساتھ کونسلنگ، شعوری تربیت اور مشورے شامل ہیں۔" : "Dual-modality plans combining evidence-focused psychiatric medication, clinical psychoeducation, and specific cognitive stabilization guidance.", benefits: c ? ["جسمانی علامات، گھبراہٹ اور دل کی دھڑکن کے مسائل سے فوری نجات", "نفی خیالات اور وہم کے طوفان کو قابو کرنے کی تھراپی", "ایک صحت مند، پرسکون اور بہتر معیار زندگی کی طرف واپسی"] : ["Targeted relief from physiological symptoms (palpitations, dread)", "Cognitive exercises to silence intrusive feedback loops", "Gradual return to a higher quality of life and peak vitality"], suitableFor: c ? "ایسے لوگ جو مسلسل گہرے خوف، اداسی، مایوسی یا دل کی گھبراہٹ کا سامنا کر رہے ہیں۔" : "Individuals experiencing recurring dread, negative thoughts, or loss of life fulfillment.", iconName: "Activity" }, { id: "sleep-management", title: c ? "نیند اور باڈی کلاک کی درستی" : "Sleep & Circadian Restoration", description: c ? "نیند نہ آنے (Insomnia) اور رات کو خوابوں کے ڈراؤنے اثرات کا معائنہ اور ان کا بہترین سائنسی علاج۔" : "Detailed analysis of insomnia and nightmares, blending medical solutions with modern Cognitive Behavioral Therapy for Insomnia (CBT-I) protocols.", benefits: c ? ["غیر نشہ آور طریقے سے نیند لانے کے لیے خصوصی مددگار ادویات کا درست استعمال", "طبی باڈی کلاک کو درست کرنے کا پرسنلائزڈ چارٹ", "بستر پر جانے کے خوف اور بے چینی کو پُرسکون طریقے سے زائل کرنا"] : ["Non-habit-forming medical sleeping aids when needed", "Custom body-clock resynchronization worksheets", "Deactivation of bedtime bedroom hyper-arousal"], suitableFor: c ? "وہ مریض جو نیند کے شدید بگاڑ، دیر تک بیدار رہنے، یا صبح بیدار ہو کر شدید تھکن محسوس کرتے ہیں۔" : "Chronic insomniacs, night shift workers, or people with sleep maintenance challenges.", iconName: "RefreshCw" }], g = [{ id: "faq-1", question: c ? "کیا میرى مشاورت اور تفصیلا ت مکمل طور پر صیغہ راز میں رکھی جائیں گی؟" : "Is my psychiatric consultation completely confidential?", answer: c ? "جی ہاں، بالکل۔ رازداری نفسیاتی علاج کا بنیادی ستون ہے۔ آپ کی تاریخ، آپ کی علامات، اور جو کچھ بھی آپ ڈاکٹر صاحب سے شیئر کرتے ہیں، وہ مکمل طور پر قانوناً اور اخلاقاً خفیہ رکھا جاتا ہے۔ کوئی بھی تفصیلات آپ کی اجازت کے بغیر کسی دوسرے فرد سے شیئر نہیں کی جاتیں۔" : "Absolutely. Confidentiality is the cornerstone of clinical psychiatric practice. Everything shared during your session—including your history, symptoms, and medical records—is protected under strict physician-patient confidentiality rules and will never be shared without your explicit consent." }, { id: "faq-2", question: c ? "نفسیاتی علاج کا پورا عمل کس طرح کام کرتا ہے؟" : "How does the psychiatric treatment process actually work?", answer: c ? "علاج کا آغاز ایک تفصیلاتی معائنے (تقریباً 40 سے 50 منٹ) سے ہوتا ہے جس میں آپ کا پس منظر سمجھا جاتا ہے۔ اس کے بعد ڈاکٹر فہد آپ کی تشخیص کے مطابق ایک طریقہ کار مرتب کرتے ہیں جس میں احتیاط سے ادویات، طرز زندگی میں تبدیلیاں، اور مشاورت شامل ہوتی ہے۔ ہر 2 سے 4 ہفتوں کے بعد فالو اپ سیشنز ہوتے ہیں تاکہ آپ کے سکون اور بہتری کا جائزہ لیا جا سکے۔" : "The process begins with an initial, unhurried diagnostic evaluation (40-50 minutes) to understand your history. Dr. Fahad then discusses your diagnosis and collaborates with you on a personalized action plan, which may include modern medication, science-backed lifestyle modifications, and practical coping exercises. Follow-up reviews are typically scheduled every 2 to 4 weeks to track your comfort and biological progress." }, { id: "faq-3", question: c ? "کیا گھر بیٹھے آن لائن ویڈیو کال کے ذریعے بھی معائنہ کرایا جا سکتا ہے؟" : "Are remote or online video consultations available?", answer: c ? "جی بالکل۔ ڈاکٹر فہد ان مریضوں کے لیے جو نوابشاہ یا حیدرآباد کے فزیکل کلینک کا سفر نہیں کر سکتے، محفوظ اور انتہائی آسان آن لائن ویڈیو کال کے ذریعے مشاورت فراہم کرتے ہیں۔ آپ کا ڈیجیٹل نسخہ واٹس ایپ یا ای میل پر بھیج دیا جاتا ہے جو کہ ہر معتبر میڈیکل اسٹور پر کارآمد ہے۔" : "Yes, Dr. Fahad offers secure and compliant online consultations via video call for patients who cannot travel to the Nawabshah or Hyderabad physical clinics. Prescriptions are generated digitally and transmitted securely to your mobile or email." }, { id: "faq-4", question: c ? "نفسیاتی علاج میں عام طور پر کتنا عرصہ لگتا ہے؟" : "How long does psychiatric treatment usually take?", answer: c ? "علاج کا دورانیہ ہر مریض کی نوعیت پر منحصر ہوتا ہے۔ ہلکے یا درمیانے درجے کے اینگزائٹی یا ڈپریشن کے لیے عموماً 6 سے 9 ماہ کا کورس درکار ہوتا ہے۔ بعض طویل العمری مسائل کو طویل وقتی نگرانی کی ضرورت ہوتی ہے تاکہ مرض دوبارہ سر نہ اٹھائے۔ ہمارا مقصد ہمیشہ آپ کو ادویات سے بتدریج اور بحفاظت نجات دلانا ہوتا ہے۔" : "The duration of treatment is deeply personal and depends on the condition. For a single episode of mild-to-moderate anxiety or depression, patients typically complete a 6 to 9-month medical course. Chronic conditions might benefit from longer maintenance care to protect against symptom relapse. Our eventual goal is always to restore natural brain balance and help you taper off medications safely." }, { id: "faq-5", question: c ? "کیا گہری اینگزائٹی اور پرانے ڈپریشن سے واقعی نجات مل سکتی ہے؟" : "Can severe anxiety and deep depression really improve?", answer: c ? "جی ہاں، سو فیصد۔ اینگزائٹی اور ڈپریشن مروجہ کیمیائی اور نیورو بائیولوجیکل مسائل ہیں جن کا علاج میڈیکل سائنس میں بہترین انداز میں موجود ہے۔ تقریباً 85 فیصد سے زائد مریض مناسب طریقہ علاج پر کاربند رہنے کے بعد بالکل نارمل ذہنی توازن حاصل کرتے ہیں اور اپنی خوشگوار زندگی کی طرف لوٹ جاتے ہیں۔" : "Yes, overwhelmingly so. Anxiety and depression are recognized clinical, neurobiological conditions that respond very well to modern science. Over 85% of patients experience significant symptom reduction, emotional stability, and a complete return to daily fulfillment when adhering to a professional clinical strategy." }, { id: "faq-6", question: c ? "مجھے کب سمجھنا چاہیے کہ مجھے اب سائیکاٹرسٹ سے رجوع کرنا ضروری ہے؟" : "When should I consider consulting a professional psychiatrist?", answer: c ? "جب آپ کی جذباتی بے چینی یا اداسی آپ کی روزمرہ زندگی، نیند، نوکری، گھریلو تعلقات یا آپ کی حفاظت کو متاثر کرنے لگے۔ اگر مسلسل دو ہفتوں سے زیادہ اداسی، گھبراہٹ یا دماغ میں برے خیالات تانتے باندھے رہیں، تو کسی ماہر سے مشورہ کرنے میں ہچکچاہٹ بالکل نہیں کرنی چاہیے۔" : "You should consult a psychiatrist if emotional distress begins interfering with your sleep, job performance, physical safety, or relationships. If feelings of sadness, anxiety, sudden panic, or racing thoughts persist for more than two consecutive weeks, speaking with a specialist is the safest step toward reclaiming control." }], v = [{ id: "t-1", patientInitials: "اے ایس", location: c ? "نوابشاہ" : "Nawabshah", feedback: c ? "میں پچھلے تین سالوں سے شدید پینک اٹیک اور بے خوابی کا شکار تھا۔ ڈاکٹر فہد کے پاس آکر مجھے پہلی بار لگا کہ میری بات غور سے سنی جا رہی ہے۔ ان کا ادویات دینے کا انداز بہت سمجھدار اور پرسکون ہے، دوز بھی مناسب رکھتی ہے جِس کا سائیڈ ایفیکٹ نہیں ہوا۔ میں اب بالکل ٹھیک ہوں اور سکون کی نیند سوتا ہوں۔" : "I st
